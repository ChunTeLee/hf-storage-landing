				<div class="relative mb-3 px-3 font-mono text-sm" data-sc-cut style="color: #2B7FFF;">bucket</div>
				<div class="relative mb-6" data-sc-cut>
					<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path opacity="0.25" d="M48.0014 5.33472H16.0014C10.1103 5.33472 5.33472 10.1103 5.33472 16.0014V48.0014C5.33472 53.8924 10.1103 58.668 16.0014 58.668H48.0014C53.8924 58.668 58.668 53.8924 58.668 48.0014V16.0014C58.668 10.1103 53.8924 5.33472 48.0014 5.33472Z" fill="#2B7FFF"/><path opacity="0.5" d="M41.3327 14.668H22.666C18.2477 14.668 14.666 18.2497 14.666 22.668V41.3346C14.666 45.7529 18.2477 49.3346 22.666 49.3346H41.3327C45.7509 49.3346 49.3327 45.7529 49.3327 41.3346V22.668C49.3327 18.2497 45.7509 14.668 41.3327 14.668Z" fill="#2B7FFF"/><path d="M36 24H28C25.7908 24 24 25.7908 24 28V36C24 38.2092 25.7908 40 28 40H36C38.2092 40 40 38.2092 40 36V28C40 25.7908 38.2092 24 36 24Z" fill="#2B7FFF"/></svg>

							<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><circle cx="9" cy="7" r="4"/>

		<script>
		function scMobileCut() {
			var container = document.getElementById('sc-mobile');
			if (!container) return;
			container.querySelectorAll('.sc-mobile-cut').forEach(function(el) { el.remove(); });
			if (container.offsetParent === null) return;
			var els = container.querySelectorAll('[data-sc-cut]');
			var cRect = container.getBoundingClientRect();
			var w = container.clientWidth;
			var h = container.clientHeight;
			var originX = (w - 100) * 0.5;
			var originY = 40;
			var bgColor = '#030712';
			var gridDiv = container.querySelector('.sc-grid-fade');
			els.forEach(function(el) {
				var r = el.getBoundingClientRect();
				var elTop = r.top - cRect.top;
				var elBottom = elTop + r.height;
				var elLeft = r.left - cRect.left;
				var elRight = elLeft + r.width;
				for (var y = originY; y < h; y += 50) {
					if (y >= elTop - 1 && y <= elBottom + 1) {
						for (var x = originX % 100; x < w; x += 100) {
							if (elRight > x && elLeft < x + 100) {
								var cut = document.createElement('div');
								cut.className = 'sc-mobile-cut';
								cut.style.cssText = 'position:absolute;left:' + x + 'px;top:' + (y - 1) + 'px;width:100px;height:3px;background:' + bgColor + ';pointer-events:none;';
								gridDiv.after(cut);
							}
						}
					}
				}
			});
		}
		scMobileCut();
		window.addEventListener('resize', function() { requestAnimationFrame(scMobileCut); });
		</script>
